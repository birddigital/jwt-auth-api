version: '3.8'

services:
  jwt-auth-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jwt-auth-api
    ports:
      - "8080:8080"
    environment:
      - JWT_SECRET=${JWT_SECRET:-change-this-secret-in-production-min-32-chars}
      - REFRESH_SECRET=${REFRESH_SECRET:-change-this-refresh-secret-in-production-min-32-chars}
      - PORT=8080
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - auth-network

  # Optional: Add Nginx reverse proxy for production
  # nginx:
  #   image: nginx:alpine
  #   container_name: jwt-auth-nginx
  #   ports:
  #     - "443:443"
  #     - "80:80"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./ssl:/etc/nginx/ssl:ro
  #   depends_on:
  #     - jwt-auth-api
  #   restart: unless-stopped
  #   networks:
  #     - auth-network

networks:
  auth-network:
    driver: bridge
